kind: "source"
spec:
  name: "test"
  registry: "github"
  path: "cloudquery/test"
  version: "v2.0.3" # latest version of source test plugin
  destinations: [test]
  tables: ["test_some_table"]
  spec:
    num_rows: 1000000
---
kind: "destination"
spec:
  name: "test"
  registry: "github"
  path: "cloudquery/test"
  version: "v2.1.2" # latest version of destination test plugin
  spec:
    error_on_write: true
