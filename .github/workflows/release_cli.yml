name: release-cli
on:
  push:
    tags:
      - "cli-v*.*.*"
env:
  CGO_ENABLED: 0

permissions:
  contents: read

jobs:
  release-cli:
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token for release
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CQ_APP_ID }}
          private-key: ${{ secrets.CQ_APP_PRIVATE_KEY }}
          repositories: |
            cloudquery
            homebrew-tap
          permission-contents: write
      # Tag format is cli-<version>
      - name: Split tag
        id: split
        run: |
          tag=${{github.ref_name}}
          echo "version=$(echo $tag | cut -d- -f2-)" >> $GITHUB_OUTPUT
      # Fail if not a valid SemVer string
      - name: Parse semver string
        id: semver_parser
        uses: booxmedialtd/ws-action-parse-semver@7784200024d6b3fc01253e617ec0168daf603de3
        with:
          input_string: ${{steps.split.outputs.version}}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: cli/go.mod
          cache: false
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-release-cache-cli-${{ hashFiles('cli/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-release-cache-cli-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser-pro
          version: "v2.14.3"
          install-only: true
      - name: Run GoReleaser Dry-Run
        run: goreleaser release --clean --skip=validate,publish -f ./cli/.goreleaser.yaml
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      - name: Login to Docker Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      # Publish to GitHub and Homebrew
      - name: Run GoReleaser Release
        if: steps.semver_parser.outputs.prerelease == ''
        run: goreleaser release --clean -f ./cli/.goreleaser.yaml
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # A custom token is required for publishing to Homebrew
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Publish only to GitHub
      - name: Run GoReleaser PreRelease
        if: steps.semver_parser.outputs.prerelease != ''
        run: goreleaser release --clean -f ./cli/.goreleaser.prerelease.yaml
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # A custom token is required for publishing to Homebrew
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Push Tag Without `cli-` component and tag prefixed with `cli/`
        if: steps.semver_parser.outputs.prerelease == ''
        run: |
          git tag ${{ steps.split.outputs.version }} && git push origin ${{ steps.split.outputs.version }}
          git tag cli/${{ steps.split.outputs.version }} && git push origin cli/${{ steps.split.outputs.version }}

      - name: Generate GitHub App token for frontend
        id: frontend-app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CQ_APP_ID }}
          private-key: ${{ secrets.CQ_APP_PRIVATE_KEY }}
          repositories: |
            frontend
          permission-contents: write
          permission-pull-requests: write
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.frontend-app-token.outputs.token }}
          repository: cloudquery/frontend
          ref: main
          path: ./frontend

      - name: Update version file
        if: steps.semver_parser.outputs.prerelease == ''
        run: 'echo "{ \"latest\": \"${{github.ref_name}}\" }" > ./frontend/apps/docs/versions/cli.json'

      - name: Update docs
        if: steps.semver_parser.outputs.prerelease == ''
        run: |
          cp -r ./cli/docs/reference/*.md ./frontend/apps/docs/content/cli/cli-reference/

      - name: Create Pull Request
        if: steps.semver_parser.outputs.prerelease == ''
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          # required so the PR triggers workflow runs
          token: ${{ steps.frontend-app-token.outputs.token }}
          path: frontend
          branch: chore/update-cli-version
          base: main
          title: "chore: Update CLI version to ${{steps.split.outputs.version}}"
          commit-message: "chore: Update CLI version to ${{steps.split.outputs.version}}"
          body: Updates the CLI latest version to ${{steps.split.outputs.version}}
          labels: automerge
      - name: Slack Notify
        uses: ravsamhq/notify-slack-action@02b169fd81108a34dbb029df4a41dd27ad680290
        if: always()
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Failed to release CLI ${{ steps.split.outputs.version }}"
          footer: "<{repo_url}|{repo}>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.ALERTS_INTEGRATIONS_SLACK_WEBHOOK_URL }}
