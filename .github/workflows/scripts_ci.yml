name: Scripts CI

on:
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/scripts_ci.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/scripts_ci.yml"

permissions:
  contents: read

jobs:
  table-diff:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scripts/table_diff
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: scripts/table_diff/go.mod
          cache: false
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-scripts-table-diff-${{ hashFiles('scripts/table_diff/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-scripts-table-diff-
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.4
          working-directory: scripts/table_diff
          args: "--config ../../plugins/.golangci.yml"
      - name: Test
        run: go test ./...
  