name: Scripts CI

on:
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/scripts_ci.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/scripts_ci.yml"

permissions:
  contents: read

jobs:
  table-diff:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scripts/table_diff
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: scripts/table_diff/go.mod
          cache: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-scripts-table-diff-${{ hashFiles('scripts/table_diff/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-scripts-table-diff-
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: scripts/table_diff
          args: "--config ../../plugins/.golangci.yml"
      - name: Test
        run: go test ./...
  