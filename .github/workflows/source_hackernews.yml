name: Source Plugin Hacker News Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'plugins/source/hackernews/**'
      - '.github/workflows/source_hackernews.yml'
  push:
    branches:
      - main
    paths:
      - 'plugins/source/hackernews/**'
      - '.github/workflows/source_hackernews.yml'

permissions:
  contents: read

jobs:
  plugins-source-hackernews:
    timeout-minutes: 30
    name: 'plugins/source/hackernews'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plugins/source/hackernews
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: plugins/source/hackernews/go.mod
          cache: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-source-hackernews-${{ hashFiles('plugins/source/hackernews/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-source-hackernews-
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: plugins/source/hackernews
          args: '--config ../../.golangci.yml'
      - name: Setup CloudQuery
        if: github.event_name == 'pull_request'
        uses: cloudquery/setup-cloudquery@b7f7ea62cfec9774ad44a0d9307d0f6c5573bcb6 # v5.0.2
        with:
          version: v6.38.0
      - name: gen
        if: github.event_name == 'pull_request'
        run: make gen
      - name: Fail if generation updated files
        if: github.event_name == 'pull_request'
        run: test "$(git status -s | wc -l)" -eq 0 || (git status -s; exit 1)
      - name: Build
        run: go build .
      - name: Test
        run: make test
