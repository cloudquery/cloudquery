name: Destination Plugin ClickHouse Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - plugins/destination/clickhouse/**
      - .github/workflows/dest_clickhouse.yml
  push:
    branches:
      - main
    paths:
      - plugins/destination/clickhouse/**
      - .github/workflows/dest_clickhouse.yml

permissions:
  contents: read

jobs:
  plugins-destination-clickhouse:
    name: 'plugins/destination/clickhouse'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: plugins/destination/clickhouse

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: plugins/destination/clickhouse/go.mod
          cache: false
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-destination-clickhouse-${{ hashFiles('plugins/destination/clickhouse/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-destination-clickhouse-
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.4
          working-directory: plugins/destination/clickhouse
          args: "--config ../../.golangci.yml"
      - name: gen
        if: github.event_name == 'pull_request'
        run: make gen
      - name: Fail if generation updated files
        if: github.event_name == 'pull_request'
        run: test "$(git status -s | wc -l)" -eq 0 || (git status -s; exit 1)
      - name: Build
        run: go build .

      - uses: hoverkraft-tech/compose-action@3c795f9eb1db588146398cd8e4ab0fe98e0f92db
        with:
          compose-file: docker-compose.yaml
          up-flags: "--wait"
          cwd: plugins/destination/clickhouse
      - name: Test ClickHouse
        run: make test
