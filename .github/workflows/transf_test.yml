name: Transformer Plugin Test Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "plugins/transformer/test/**"
      - ".github/workflows/transf_test.yml"
  push:
    branches:
      - main
    paths:
      - "plugins/transformer/test/**"
      - ".github/workflows/transf_test.yml"

permissions:
  contents: read

jobs:
  plugins-transformer-test:
    timeout-minutes: 30
    name: "plugins/transformer/test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plugins/transformer/test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: plugins/transformer/test/go.mod
          cache: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-transformer-test-${{ hashFiles('plugins/transformer/test/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-transformer-test-
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: plugins/transformer/test
          args: "--config ../../.golangci.yml"
      - name: Build
        run: go build .
      - name: Test
        run: make test
  