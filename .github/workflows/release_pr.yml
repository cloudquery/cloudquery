name: release-please
on:
  push:
    branches:
      - main

concurrency:
  group: release-please-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-pr:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.GH_CQ_BOT }}
