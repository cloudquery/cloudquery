name: Source Plugin Bitbucket Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "plugins/source/bitbucket/**"
      - ".github/workflows/source_bitbucket.yml"
  push:
    branches:
      - main
    paths:
      - "plugins/source/bitbucket/**"
      - ".github/workflows/source_bitbucket.yml"

permissions:
  contents: read

jobs:
  plugins-source-bitbucket:
    timeout-minutes: 30
    name: "plugins/source/bitbucket"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plugins/source/bitbucket
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: "temurin"
          java-version: "20"
          cache: "gradle"
          cache-dependency-path: "plugins/source/bitbucket/**/build.gradle"
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Build package
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          require_passed_tests: true
          fail_on_failure: true
  
