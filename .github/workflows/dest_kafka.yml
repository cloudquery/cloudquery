name: Destination Plugin Kafka Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "plugins/destination/kafka/**"
      - ".github/workflows/dest_kafka.yml"
  push:
    branches:
      - main
    paths:
      - "plugins/destination/kafka/**"
      - ".github/workflows/dest_kafka.yml"

permissions:
  contents: read

jobs:
  plugins-destination-kafka:
    timeout-minutes: 30
    name: "plugins/destination/kafka"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plugins/destination/kafka
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: plugins/destination/kafka/go.mod
          cache: false
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-destination-kafka-${{ hashFiles('plugins/destination/kafka/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-destination-kafka-
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.10.1
          working-directory: plugins/destination/kafka
          args: "--config ../../.golangci.yml"
      - name: gen
        if: github.event_name == 'pull_request'
        run: make gen
      - name: Fail if generation updated files
        if: github.event_name == 'pull_request'
        run: test "$(git status -s | wc -l)" -eq 0 || (git status -s; exit 1)
      - name: Build
        run: go build .
      - name: Test
        run: make test

  validate-fips:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plugins/destination/kafka
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: plugins/destination/kafka/go.mod
          cache: false

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-validate-plugin-fips-cache-destination-kafka-${{ hashFiles('plugins/destination/kafka/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-validate-plugin-fips-cache-destination-kafka-

      - name: Run package command
        env:
          GOFLAGS: "-tags=fipsEnabled"
        run: |
          rm -rf docs/tables.md
          go run main_fips.go package -m "chore: Test FIPS" "v1.0.0" .

      - name: Unzip package artifacts
        run: |
          unzip -o dist/plugin-kafka-v1.0.0-linux-amd64.zip
          chmod +x plugin-kafka-v1.0.0-linux-amd64
          ./plugin-kafka-v1.0.0-linux-amd64 --version 2>&1 | grep -E 'FIPS enabled: true'
