name: release-scaffold
on:
  push:
    tags:
      - "scaffold-v*.*.*"
env:
  CGO_ENABLED: 0

permissions:
  contents: read

jobs:
  release-scaffold:
    timeout-minutes: 30
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token for release
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.CQ_APP_ID }}
          private-key: ${{ secrets.CQ_APP_PRIVATE_KEY }}
          repositories: |
            cloudquery
            homebrew-tap
          permission-contents: write
      # Tag format is scaffold-<version>
      - name: Split tag
        id: split
        run: |
          tag=${{github.ref_name}}
          echo "version=$(echo $tag | cut -d- -f2-)" >> $GITHUB_OUTPUT
      # Fail if not a valid SemVer string
      - name: Parse semver string
        id: semver_parser
        uses: booxmedialtd/ws-action-parse-semver@7784200024d6b3fc01253e617ec0168daf603de3
        with:
          input_string: ${{steps.split.outputs.version}}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Set up Go 1.x
        id: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: scaffold/go.mod
          cache: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-release-cache-scaffold-${{ hashFiles('scaffold/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-release-cache-scaffold-
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          distribution: goreleaser-pro
          version: "v2.14.3"
          install-only: true
      - name: Run GoReleaser Dry-Run
        run: goreleaser release --snapshot --clean --skip=validate,publish -f ./scaffold/.goreleaser.yaml
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Publish to GitHub and Homebrew
      - name: Run GoReleaser Release
        if: steps.semver_parser.outputs.prerelease == ''
        run: goreleaser release --clean -f ./scaffold/.goreleaser.yaml
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # A custom token is required for publishing to Homebrew
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Publish only to GitHub
      - name: Run GoReleaser PreRelease
        if: steps.semver_parser.outputs.prerelease != ''
        run: goreleaser release --clean -f ./scaffold/.goreleaser.prerelease.yaml
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # A custom token is required for publishing to Homebrew
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Push Tag prefixed with `scaffold/`
        if: steps.semver_parser.outputs.prerelease == ''
        run: |
          git tag scaffold/${{ steps.split.outputs.version }} && git push origin scaffold/${{ steps.split.outputs.version }}

      - name: Generate GitHub App token for frontend
        id: frontend-app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.CQ_APP_ID }}
          private-key: ${{ secrets.CQ_APP_PRIVATE_KEY }}
          repositories: |
            frontend
          permission-contents: write
          permission-pull-requests: write
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.frontend-app-token.outputs.token }}
          repository: cloudquery/frontend
          ref: main
          path: ./frontend

      - name: Update version file
        if: steps.semver_parser.outputs.prerelease == ''
        run: 'echo "{ \"latest\": \"${{github.ref_name}}\" }" > ./frontend/apps/docs/versions/scaffold.json'

      - name: Create Pull Request
        if: steps.semver_parser.outputs.prerelease == ''
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          # required so the PR triggers workflow runs
          token: ${{ steps.frontend-app-token.outputs.token }}
          path: frontend
          branch: chore/update-scaffold-version
          base: main
          title: "chore: Update Scaffold version to ${{steps.split.outputs.version}}"
          commit-message: "chore: Update Scaffold version to ${{steps.split.outputs.version}}"
          body: Updates Scaffold latest version to ${{steps.split.outputs.version}}
          labels: automerge
      - name: Slack Notify
        uses: ravsamhq/notify-slack-action@0670a0482d2a919531ba3b219e0c535fe4fcc791
        if: always()
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Failed to release Scaffold ${{ steps.split.outputs.version }}"
          footer: "<{repo_url}|{repo}>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.ALERTS_INTEGRATIONS_SLACK_WEBHOOK_URL }}
